services:
  dashboard:
    container_name: dev_dashboard

    build:
      context: ./backend
      dockerfile: Dockerfile

    image: code-dashboard:latest

    restart: unless-stopped

    ports:
      - "9090:9090"

    environment:
      DASHBOARD_USER: admin
      DASHBOARD_PASS: admin

      # Optional
      PYTHONUNBUFFERED: "1"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s